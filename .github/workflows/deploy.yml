name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm install --frozen-lockfile

      - name: Run typecheck
        run: |
          corepack prepare pnpm@10 --activate
          pnpm typecheck

      - name: Run tests
        run: |
          corepack prepare pnpm@10 --activate
          pnpm test

      - name: Build project
        run: |
          corepack prepare pnpm@10 --activate
          pnpm build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Vercel production deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing VERCEL_DEPLOY_HOOK_URL secret."
            echo "Add a Vercel Deploy Hook URL in repository secrets to enable auto deployment from this workflow."
            exit 1
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
