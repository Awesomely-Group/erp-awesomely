name: Refresh staging database from production

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Restore staging from production
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          echo "Dropping staging schema..."
          psql "$DATABASE_URL_STAGING" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO PUBLIC;"

          echo "Dumping production and restoring to staging..."
          pg_dump "$DATABASE_URL_PROD" | psql "$DATABASE_URL_STAGING"

          echo "Staging database refreshed successfully"
